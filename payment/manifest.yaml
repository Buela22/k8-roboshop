apiversion: v1
kind: config-map
metadata:
  name: payment
  namespace: roboshop
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "roboshop"
  AMQP_PASS: "roboshop123"
---
apiversion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  # these are replica set lables
  labels:
    project: roboshop
    component: payment
    tier: backend
spec:
  replicas: 1
  selector:
  # these lables are used to select pods
    matchLabels:
       project: roboshop
       component: payment
       tier: backend
      #pod definition
  template:
    metadata:
      lables:
         project: roboshop
         component: payment
         tier: backend
    spec:
      containers:
      - name: payment
        image: buela22/payment:v1
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: payment
        ports:
        - name: liveness-port
        containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---
apiversion: v1
kind: service
metadata:
  name: payment
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: payment
    tier: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080