apiversion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: roboshop
  # these are replica set lables
  labels:
    project: roboshop
    component: frontend
    tier: frontend
spec:
  replicas: 1
  selector:
  # these lables are used to select pods
    matchLabels:
       project: roboshop
       component: frontend
       tier: frontend
      #pod definition
  template:
    metadata:
      lables:
         project: roboshop
         component: frontend
         tier: frontend
    spec:
      containers:
      - name: frontend
        image: buela22/frontend:v1
        imagePullPolicy: Always
        ports:
        - name: liveness-port
        containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
---
apiversion: v1
kind: service
metadata:
  name: frontend
  namespace: roboshop
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    component: frontend
    tier: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80