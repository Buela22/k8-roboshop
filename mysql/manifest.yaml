apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql
  namespace: roboshop
data:
  my.cnf: |
    [mysqld]
    innodb_redo_log_capacity = 2G
---
apiversion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  # these are replica set lables
  labels:
    project: roboshop
    component: mysql
    tier: db
spec:
  replicas: 1
  selector:
  # these lables are used to select pods
    matchLabels:
       project: roboshop
       component: mysql
       tier: db
      #pod definition
  template:
    metadata:
      lables:
         project: roboshop
         component: mysql
         tier: db
    spec:
      containers:
      - name: mysql
        image: buela22/mysql:v1
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3306
          initialDelaySeconds: 20
          periodSeconds: 5
        volumeMounts:
        - name: mysql-config
          mountPath: /etc//mysql/conf.d/my.cnf
          subPath: my.cnf
      volumes:
      - name: mysql-config
        configMap:
          name: mysql-config     
---
apiversion: v1
kind: service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: mysql
    tier: db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306